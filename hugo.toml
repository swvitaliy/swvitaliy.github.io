baseURL = "https://swvit.com/"
languageCode = "en-us"
title = "swvit's blog"
theme = "rocinante"
pagerSize = 3

[markup]
  [markup.goldmark.renderer]
    unsafe= true

[params]
  colorScheme = "auto" # "light" or "dark" or "auto". Defaults to light.
  mainSections = ["posts"]
  email = "mail@example.com"
  favicon = "/icons/favicon.png"
  about = """
About section. Enter details about you here.
"""

  [[params.links]]
    [[params.links.link]]
      name = "Resume"
      href = "/Resume.pdf"
    [[params.links.link]]
      name = "Email"
      href = "/contact"
      smart_email_link = true

  [[params.links]]
    [[params.links.link]]
      name = "Github"
      href = "https://github.com/"
      new_tab = true
    [[params.links.link]]
      name = "Mastodon"
      href = "https://mastodon.social/"
      new_tab = true
    [[params.links.link]]
      name = "Twitter"
      href = "https://twitter.com/"
      new_tab = true
    [[params.links.link]]
      name = "Instagram"
      href = "https://instagram.com/"
      new_tab = true